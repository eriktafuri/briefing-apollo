<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Briefing de Projeto — Apollo Gestão Digital</title>
<style>
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }

:root {
  color-scheme: light;

  --page:   #E9EAEC;
  --paper:  #FFFFFF;
  --ink:    #14151A;
  --ink-2:  #4B4D56;
  --muted:  #8B8E98;
  --line:   rgba(20,21,26,.13);
  --line-2: rgba(20,21,26,.07);

  --grad:   linear-gradient(95deg, #FFB238 0%, #F2701D 55%, #E8460C 100%);
  --accent: #E8590C;
  --err:    #D5484A;

  --f-sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --f-mono: ui-monospace, "Cascadia Code", "SF Mono", "Segoe UI Mono", Menlo, Consolas, monospace;
}

body {
  margin: 0; background: var(--page); color: var(--ink-2);
  font-family: var(--f-sans); line-height: 1.6;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  min-height: 100vh; min-height: 100dvh;
}

/* ---------- Topo ---------- */
#topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 18px clamp(20px, 5vw, 40px) 0; }
#topbar .logo { height: 26px; width: auto; display: block; }
#stepCount { font-family: var(--f-mono); font-size: .66rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

#progress-wrap { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: var(--line-2); z-index: 11; }
#progress-fill { height: 100%; width: 0%; background: var(--grad); transition: width .35s cubic-bezier(.2,.7,.2,1); }

/* ---------- Palco ---------- */
#stage { min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 90px clamp(20px, 6vw, 40px) 60px; }
.screen { max-width: 620px; width: 100%; animation: enter .5s cubic-bezier(.2,.7,.2,1) both; }
@keyframes enter { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

.eyebrow { font-family: var(--f-mono); font-size: .68rem; letter-spacing: .16em; text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 16px; }
.q { font-weight: 500; color: var(--ink); font-size: clamp(1.35rem, 4vw, 1.9rem); line-height: 1.32; letter-spacing: -.015em; text-wrap: balance; margin: 0 0 8px; }
.q-hint { margin: 0 0 22px; color: var(--muted); font-size: .88rem; font-style: italic; }
.q-req { color: var(--accent); }

.g { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }

/* ---------- Campos ---------- */
.field-wrap { margin-top: 22px; }
.field { font: inherit; font-size: 1.02rem; color: var(--ink); padding: 15px 17px; border: 1px solid var(--line); border-radius: 11px; background: var(--paper); outline: none; transition: border-color .15s ease, box-shadow .15s ease; width: 100%; }
.field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,89,12,.1); }
textarea.field { min-height: 130px; resize: vertical; line-height: 1.55; }
.err-msg { display: none; margin: 10px 2px 0; font-size: .82rem; color: var(--err); font-weight: 600; }
.err-msg.show { display: block; }

/* ---------- Tags (múltipla escolha) ---------- */
.tags { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 22px; }
.tag-opt { font: inherit; font-size: .86rem; color: var(--ink-2); background: var(--paper); border: 1px solid var(--line); border-radius: 20px; padding: 9px 16px; cursor: pointer; transition: border-color .15s ease, background .15s ease, color .15s ease; }
.tag-opt:hover { border-color: var(--accent); }
.tag-opt.picked { border-color: var(--accent); background: #FFF3E9; color: var(--ink); font-weight: 650; }

/* ---------- Upload ---------- */
.drop { margin-top: 22px; border: 2px dashed var(--line); border-radius: 14px; padding: 36px 20px; text-align: center; cursor: pointer; transition: border-color .15s ease, background .15s ease; }
.drop:hover, .drop.drag { border-color: var(--accent); background: #FFFAF5; }
.drop svg { width: 26px; height: 26px; stroke: var(--accent); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 10px; }
.drop b { display: block; color: var(--ink); font-size: .95rem; }
.drop span { display: block; margin-top: 4px; font-size: .78rem; color: var(--muted); }
.file-list { margin-top: 14px; display: grid; gap: 8px; }
.file-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 14px; border: 1px solid var(--line); border-radius: 9px; background: var(--paper); font-size: .84rem; color: var(--ink-2); }
.file-item b { color: var(--ink); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .sz { font-family: var(--f-mono); font-size: .72rem; color: var(--muted); flex: none; }
.file-item .rm { flex: none; width: 22px; height: 22px; border: 0; background: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1; border-radius: 6px; }
.file-item .rm:hover { color: var(--err); background: #FDF0EF; }

/* ---------- Botões ---------- */
.actions { display: flex; align-items: center; gap: 18px; margin-top: 30px; flex-wrap: wrap; }
.btn-next { display: inline-flex; align-items: center; gap: 9px; font-weight: 600; font-size: .95rem; color: #fff; background: var(--accent); border: 0; border-radius: 10px; padding: 14px 24px; cursor: pointer; transition: background .18s ease, transform .18s ease; }
.btn-next:hover { background: #C94A0A; transform: translateY(-1px); }
.btn-next:disabled { opacity: .55; cursor: default; transform: none; }
.btn-next svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.btn-back { font: inherit; font-size: .86rem; font-weight: 600; color: var(--muted); background: none; border: 0; cursor: pointer; padding: 6px 2px; }
.btn-back:hover { color: var(--ink); }
.skip { font: inherit; font-size: .82rem; color: var(--muted); background: none; border: 0; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
.skip:hover { color: var(--ink-2); }

/* ---------- Telas especiais ---------- */
.center { text-align: center; }
.welcome-mark { width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 24px; display: grid; place-items: center; background: #FFF3E9; }
.welcome-mark svg { width: 26px; height: 26px; stroke: var(--accent); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
.lead { color: var(--ink-2); font-size: 1rem; line-height: 1.65; margin: 0 0 6px; }
.lead + .lead { margin-top: 14px; }

.spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--line); border-top-color: var(--accent); margin: 0 auto 20px; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.done-mark { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 22px; display: grid; place-items: center; background: var(--grad); }
.done-mark svg { width: 28px; height: 28px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

.fail-note { margin-top: 18px; font-size: .82rem; color: var(--muted); }

@media (prefers-reduced-motion: reduce) {
  .screen { animation: none; }
  .spinner { animation: none; }
}
</style>
</head>
<body>

<div id="progress-wrap"><div id="progress-fill"></div></div>
<div id="topbar">
  <img class="logo" src="apollo-logo.png" alt="Apollo Gestão Digital">
  <span id="stepCount"></span>
</div>
<main id="stage"><div class="screen" id="screen"></div></main>

<script>
(function () {

  /* ================= CONFIG ================= */
  var CONFIG = {
    // Cole aqui a URL do Web App depois de publicar o Apps Script (ver README.md)
    endpoint: 'https://script.google.com/macros/s/AKfycbwdljBSI93L2Q6C2XYU07yQnDj0VQm52Mu2KeNNFCpCaHCptr2dvU7bX4_E9hBOaamb/exec',
    maxFileSizeMB: 15,
    maxFilesPerField: 5,
  };

  var PERSONALIDADES = [
    'Inovadora','Determinada','Forte','Agressiva','Discreta','Delicada','Elegante','Moderna',
    'Feliz','Alegre','Divertida','Simples','Tradicional','Rústica','Ousada','Imponente',
    'Chamativa','Profissional','Séria','Calma','Sutil','Diferente','Corajosa','Amorosa',
    'Romântica','Amigável','Convidativa','Radical','Digital','Antiga','Nostálgica','Persistente',
    'Arrojada','Sonhadora','Convencional','Complexa','Criativa','Industrial','Promissora',
    'Deslumbrante','Inteligente','Nobre','Comum','Poderosa','Casual','Famosa','Descolada',
    'Clássica','Destemida'
  ];

  /* ================= PERGUNTAS (data-driven) ================= */
  var BLOCKS = [
    { name: 'Quem está respondendo', questions: [
      { id: 'respNome', type: 'text', label: 'Antes de tudo, qual é o seu nome?', required: true, placeholder: 'Seu nome' },
      { id: 'respEmail', type: 'email', label: 'Qual o melhor e-mail pra te mandar as próximas etapas?', required: true, placeholder: 'voce@empresa.com.br' },
      { id: 'respWhatsapp', type: 'tel', label: 'E um WhatsApp, pra eu te chamar quando for mais rápido?', required: false, placeholder: '(16) 90000-0000' }
    ]},
    { name: 'Sobre a empresa', questions: [
      { id: 'empresaNome', type: 'text', label: 'Como se chama a sua empresa?', required: true, placeholder: 'Ex.: Grupo BrasilServ' },
      { id: 'empresaInicio', type: 'text', label: 'Há quanto tempo ela existe?', required: true, placeholder: 'Ex.: 2015' },
      { id: 'empresaAtividade', type: 'textarea', label: 'Me conta o que vocês fazem — o que a empresa oferece hoje?', required: true },
      { id: 'empresaProdutos', type: 'textarea', label: 'E quais são os principais produtos ou serviços de vocês?', required: true }
    ]},
    { name: 'Objetivo do projeto', questions: [
      { id: 'objetivoPrincipal', type: 'textarea', label: 'O que você mais quer que essa página faça por você?', required: true },
      { id: 'objetivoSucesso', type: 'textarea', label: 'Daqui a alguns meses, o que precisa ter acontecido pra você dizer que valeu a pena?', required: false }
    ]},
    { name: 'Público', questions: [
      { id: 'publicoIdeal', type: 'textarea', label: 'Pra quem é essa página, na prática? Descreve a pessoa ideal.', required: true },
      { id: 'publicoObjecoes', type: 'textarea', label: 'O que passa pela cabeça dessa pessoa antes de decidir comprar ou te chamar — que dúvida ou receio ela tem?', required: false }
    ]},
    { name: 'Concorrência e posicionamento', questions: [
      { id: 'concorrentes', type: 'textarea', label: 'Quem são os concorrentes que você mais observa hoje?', hint: 'Manda o link se tiver.', required: true },
      { id: 'diferenciais', type: 'textarea', label: 'Onde você acha que vocês ganham deles?', required: false },
      { id: 'concorrentesFrente', type: 'textarea', label: 'E onde você sente que eles ainda estão na frente?', required: false }
    ]},
    { name: 'Comunicação e tom da marca', questions: [
      { id: 'personalidade', type: 'tags', label: 'Se sua marca fosse uma pessoa, como ela seria?', hint: 'Escolhe quantas palavras fizerem sentido.', required: true, options: PERSONALIDADES },
      { id: 'personalidadeTop3', type: 'text', label: 'Dessas que você escolheu, quais são as três que mais definem vocês?', required: true },
      { id: 'linguagemEvitar', type: 'text', label: 'Tem alguma forma de falar que você não quer ver na página?', required: false },
      { id: 'naoQuerVer', type: 'text', label: 'E algo que você definitivamente não quer ver no projeto?', required: false }
    ]},
    { name: 'Visual e referências', questions: [
      { id: 'identidadeVisual', type: 'upload', label: 'Vocês já têm identidade visual — logo, cores, fontes?', hint: 'Se tiver, manda os arquivos aqui (logo, manual de marca, etc.).', required: false },
      { id: 'referenciasVisuais', type: 'textarea', label: 'Tem algum site ou marca que te inspira visualmente?', hint: 'Manda o link se lembrar de algum.', required: false }
    ]},
    { name: 'Conteúdo', questions: [
      { id: 'conteudoArquivos', type: 'upload', label: 'Já tem fotos, textos ou algum material que devemos usar na página?', hint: 'Pode subir tudo aqui.', required: false }
    ]},
    { name: 'Informações finais', questions: [
      { id: 'infoAdicional', type: 'textarea', label: 'Tem algo importante sobre o seu negócio que eu não perguntei e você acha que eu deveria saber?', required: false }
    ]}
  ];

  var TOTAL_QUESTIONS = BLOCKS.reduce(function (n, b) { return n + b.questions.length; }, 0);

  /* ================= ESTADO ================= */
  var state = { stepIndex: 0, answers: { personalidade: [] }, files: {} };

  function esc(s) {
    return (s || '').toString().replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  /* ================= MONTAGEM DO FLUXO ================= */
  var FLOW = [];

  FLOW.push({ progress: null, render: function () {
    return '<div class="center">' +
      '<div class="welcome-mark"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4L18.5 9.5l-4-4L4 16v4z"/><path d="M13 7l4 4"/></svg></div>' +
      '<span class="eyebrow">Briefing de projeto</span>' +
      '<p class="q">Vamos conversar sobre a sua <span class="g">marca</span> e o seu <span class="g">negócio</span>.</p>' +
      '<p class="lead">Esse briefing é a nossa conversa antes de eu começar a desenhar sua página. Tudo o que você contar aqui vira direção de design, de texto e de estrutura — é literalmente a base do projeto.</p>' +
      '<p class="lead">Escreve com suas palavras, do jeito que sair. Não estou atrás de resposta perfeita, só do que é real sobre o seu negócio. E se travar em alguma pergunta, pula — a gente ajusta depois numa conversa.</p>' +
      '<div class="actions" style="justify-content:center;"><button class="btn-next" onclick="app.next()">Vamos lá<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button></div>' +
      '</div>';
  }});

  var qCounter = 0;
  BLOCKS.forEach(function (block) {
    block.questions.forEach(function (q, i) {
      qCounter++;
      FLOW.push(questionScreen(q, block.name, qCounter));
    });
  });

  FLOW.push({ progress: null, render: function () {
    return '<div class="center">' +
      '<span class="eyebrow">Quase lá</span>' +
      '<p class="q">Tudo pronto para enviar.</p>' +
      '<p class="lead">Confira se preencheu o que fizer sentido para você e clique abaixo para enviar seu briefing.</p>' +
      '<div class="actions" style="justify-content:center;" id="submitActions">' +
        '<button class="btn-back" onclick="app.back()">← Voltar</button>' +
        '<button class="btn-next" id="submitBtn" onclick="app.submit()">Enviar briefing<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>' +
      '</div>' +
      '<p class="err-msg" id="submitErr"></p>' +
      '</div>';
  }});

  FLOW.push({ progress: null, render: function () {
    return '<div class="center">' +
      '<div class="spinner"></div>' +
      '<p class="lead">Enviando seu briefing...</p>' +
      '</div>';
  }, after: doSubmit });

  FLOW.push({ progress: null, render: function () {
    return '<div class="center">' +
      '<div class="done-mark"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 13l4 4L19 7"/></svg></div>' +
      '<span class="eyebrow">Recebido</span>' +
      '<p class="q">Obrigado, ' + esc(state.answers.respNome || '') + '!</p>' +
      '<p class="lead">Recebi tudo certinho por aqui. Já vou ler com calma e usar isso pra desenhar sua página — qualquer dúvida no caminho, eu te chamo.</p>' +
      '</div>';
  }});

  FLOW.push({ progress: null, render: function () {
    return '<div class="center">' +
      '<span class="eyebrow">Ops</span>' +
      '<p class="q">Não conseguimos enviar seu briefing.</p>' +
      '<p class="lead">Verifique sua conexão e tente novamente.</p>' +
      '<div class="actions" style="justify-content:center;"><button class="btn-next" onclick="app.retry()">Tentar de novo</button></div>' +
      '<p class="fail-note">Se o problema continuar, chame a Apollo no WhatsApp (16) 99611-2109.</p>' +
      '</div>';
  }});

  var IDX_SUBMIT_SCREEN = 1 + TOTAL_QUESTIONS;
  var IDX_SENDING = IDX_SUBMIT_SCREEN + 1;
  var IDX_THANKYOU = IDX_SENDING + 1;
  var IDX_FAIL = IDX_THANKYOU + 1;

  /* ================= RENDER DE PERGUNTA ================= */
  function questionScreen(q, blockName, position) {
    return {
      progress: position,
      render: function () { return renderQuestion(q, blockName); },
      after: function () { attachQuestion(q); }
    };
  }

  function renderQuestion(q, blockName) {
    var reqMark = q.required ? ' <span class="q-req">*</span>' : '';
    var html = '<span class="eyebrow">' + esc(blockName) + '</span>' +
      '<p class="q">' + esc(q.label) + reqMark + '</p>';
    if (q.hint) html += '<p class="q-hint">' + esc(q.hint) + '</p>';

    if (q.type === 'text' || q.type === 'email' || q.type === 'tel') {
      var val = esc(state.answers[q.id] || '');
      html += '<div class="field-wrap"><input class="field" id="f-' + q.id + '" type="' + q.type + '" value="' + val + '" placeholder="' + esc(q.placeholder || '') + '"></div>';
    } else if (q.type === 'textarea') {
      html += '<div class="field-wrap"><textarea class="field" id="f-' + q.id + '" placeholder="Sua resposta">' + esc(state.answers[q.id] || '') + '</textarea></div>';
    } else if (q.type === 'tags') {
      html += '<div class="tags" id="f-' + q.id + '">';
      q.options.forEach(function (opt) {
        var picked = (state.answers[q.id] || []).indexOf(opt) > -1 ? ' picked' : '';
        html += '<button type="button" class="tag-opt' + picked + '" data-val="' + esc(opt) + '">' + esc(opt) + '</button>';
      });
      html += '</div>';
    } else if (q.type === 'upload') {
      html += '<div class="drop" id="drop-' + q.id + '">' +
        '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V4M7.5 8.5L12 4l4.5 4.5M5 16v3a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3"/></svg>' +
        '<b>Arraste os arquivos aqui</b><span>ou clique para selecionar · até ' + CONFIG.maxFilesPerField + ' arquivos, ' + CONFIG.maxFileSizeMB + 'MB cada</span>' +
        '<input type="file" id="input-' + q.id + '" multiple style="display:none">' +
        '</div>' +
        '<div class="file-list" id="list-' + q.id + '">' + renderFileList(q.id) + '</div>';
    }

    html += '<p class="err-msg" id="err-' + q.id + '"></p>';
    html += '<div class="actions">';
    html += '<button class="btn-back" onclick="app.back()">← Voltar</button>';
    html += '<button class="btn-next" onclick="app.advance(\'' + q.id + '\')">Continuar<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>';
    if (!q.required) html += '<button class="skip" onclick="app.skip()">pular esta</button>';
    html += '</div>';
    return html;
  }

  function renderFileList(id) {
    var files = state.files[id] || [];
    return files.map(function (f, i) {
      return '<div class="file-item"><b>' + esc(f.name) + '</b><span class="sz">' + fmtSize(f.size) + '</span>' +
        '<button type="button" class="rm" onclick="app.removeFile(\'' + id + '\',' + i + ')">✕</button></div>';
    }).join('');
  }

  function attachQuestion(q) {
    if (q.type === 'text' || q.type === 'email' || q.type === 'tel' || q.type === 'textarea') {
      var el = document.getElementById('f-' + q.id);
      el.focus();
      if (q.type !== 'textarea') {
        el.addEventListener('keydown', function (e) { if (e.key === 'Enter') app.advance(q.id); });
      }
    } else if (q.type === 'tags') {
      var wrap = document.getElementById('f-' + q.id);
      wrap.querySelectorAll('.tag-opt').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var v = btn.getAttribute('data-val');
          var arr = state.answers[q.id] || [];
          var idx = arr.indexOf(v);
          if (idx > -1) { arr.splice(idx, 1); btn.classList.remove('picked'); }
          else { arr.push(v); btn.classList.add('picked'); }
          state.answers[q.id] = arr;
        });
      });
    } else if (q.type === 'upload') {
      var drop = document.getElementById('drop-' + q.id);
      var input = document.getElementById('input-' + q.id);
      drop.addEventListener('click', function () { input.click(); });
      input.addEventListener('change', function () { handleFiles(q.id, input.files); });
      ['dragover', 'dragleave', 'drop'].forEach(function (evt) {
        drop.addEventListener(evt, function (e) {
          e.preventDefault();
          drop.classList.toggle('drag', evt === 'dragover');
          if (evt === 'drop') handleFiles(q.id, e.dataTransfer.files);
        });
      });
    }
  }

  function handleFiles(id, fileList) {
    var current = state.files[id] || [];
    var errEl = document.getElementById('err-' + id);
    errEl.classList.remove('show');
    var toAdd = Array.prototype.slice.call(fileList);
    for (var i = 0; i < toAdd.length; i++) {
      var f = toAdd[i];
      if (current.length >= CONFIG.maxFilesPerField) {
        errEl.textContent = 'Máximo de ' + CONFIG.maxFilesPerField + ' arquivos.';
        errEl.classList.add('show');
        break;
      }
      if (f.size > CONFIG.maxFileSizeMB * 1024 * 1024) {
        errEl.textContent = '"' + f.name + '" passa de ' + CONFIG.maxFileSizeMB + 'MB e não foi adicionado.';
        errEl.classList.add('show');
        continue;
      }
      (function (file) {
        var reader = new FileReader();
        reader.onload = function () {
          current.push({ name: file.name, size: file.size, type: file.type || 'application/octet-stream', dataUrl: reader.result });
          state.files[id] = current;
          document.getElementById('list-' + id).innerHTML = renderFileList(id);
        };
        reader.readAsDataURL(file);
      })(f);
    }
  }

  /* ================= NAVEGAÇÃO ================= */
  var screenEl = document.getElementById('screen');

  function findQuestion(id) {
    for (var b = 0; b < BLOCKS.length; b++) {
      for (var i = 0; i < BLOCKS[b].questions.length; i++) {
        if (BLOCKS[b].questions[i].id === id) return BLOCKS[b].questions[i];
      }
    }
    return null;
  }

  function readCurrentValue(q) {
    if (q.type === 'text' || q.type === 'email' || q.type === 'tel' || q.type === 'textarea') {
      var el = document.getElementById('f-' + q.id);
      state.answers[q.id] = el ? el.value.trim() : '';
    }
  }

  function validateCurrent(q) {
    if (!q.required) return true;
    if (q.type === 'tags') return (state.answers[q.id] || []).length > 0;
    return !!(state.answers[q.id] && state.answers[q.id].length);
  }

  function show(index) {
    state.stepIndex = index;
    var step = FLOW[index];
    screenEl.innerHTML = step.render();
    screenEl.style.animation = 'none';
    void screenEl.offsetWidth;
    screenEl.style.animation = '';
    updateProgress(step.progress);
    window.scrollTo({ top: 0 });
    if (step.after) step.after();
  }

  function updateProgress(pos) {
    var wrap = document.getElementById('progress-wrap');
    var stepCount = document.getElementById('stepCount');
    if (!pos) { wrap.style.opacity = '0'; stepCount.textContent = ''; return; }
    wrap.style.opacity = '1';
    document.getElementById('progress-fill').style.width = Math.round((pos / TOTAL_QUESTIONS) * 100) + '%';
    stepCount.textContent = pos + ' / ' + TOTAL_QUESTIONS;
  }

  var app = {
    next: function () { if (state.stepIndex < FLOW.length - 1) show(state.stepIndex + 1); },
    back: function () { if (state.stepIndex > 0) show(state.stepIndex - 1); },
    skip: function () { app.next(); },
    advance: function (qid) {
      var q = findQuestion(qid);
      readCurrentValue(q);
      var errEl = document.getElementById('err-' + qid);
      if (!validateCurrent(q)) {
        errEl.textContent = 'Este campo é obrigatório.';
        errEl.classList.add('show');
        return;
      }
      errEl.classList.remove('show');
      app.next();
    },
    removeFile: function (id, i) {
      state.files[id].splice(i, 1);
      document.getElementById('list-' + id).innerHTML = renderFileList(id);
    },
    submit: function () { show(IDX_SENDING); },
    retry: function () { show(IDX_SENDING); }
  };
  window.app = app;

  function doSubmit() {
    var payload = {
      respNome: state.answers.respNome || '',
      respEmail: state.answers.respEmail || '',
      respWhatsapp: state.answers.respWhatsapp || '',
      empresaNome: state.answers.empresaNome || '',
      empresaInicio: state.answers.empresaInicio || '',
      empresaAtividade: state.answers.empresaAtividade || '',
      empresaProdutos: state.answers.empresaProdutos || '',
      objetivoPrincipal: state.answers.objetivoPrincipal || '',
      objetivoSucesso: state.answers.objetivoSucesso || '',
      publicoIdeal: state.answers.publicoIdeal || '',
      publicoObjecoes: state.answers.publicoObjecoes || '',
      concorrentes: state.answers.concorrentes || '',
      diferenciais: state.answers.diferenciais || '',
      concorrentesFrente: state.answers.concorrentesFrente || '',
      personalidade: state.answers.personalidade || [],
      personalidadeTop3: state.answers.personalidadeTop3 || '',
      linguagemEvitar: state.answers.linguagemEvitar || '',
      naoQuerVer: state.answers.naoQuerVer || '',
      referenciasVisuais: state.answers.referenciasVisuais || '',
      infoAdicional: state.answers.infoAdicional || '',
      files: {
        identidadeVisual: state.files.identidadeVisual || [],
        conteudoArquivos: state.files.conteudoArquivos || []
      }
    };

    fetch(CONFIG.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    }).then(function (res) { return res.json(); })
      .then(function (data) {
        if (data && data.ok) show(IDX_THANKYOU);
        else show(IDX_FAIL);
      })
      .catch(function () { show(IDX_FAIL); });
  }

  show(0);
})();
</script>
</body>
</html>
